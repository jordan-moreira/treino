<!doctype html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Calculadora de Paces</title>
		<link rel="stylesheet" href="style.css" />
	</head>

	<body>
		<table>
			<caption>
				Calculadora de Métricas
			</caption>
			<thead>
				<tr>
					<th>ZONA</th>
					<th>MIN</th>
					<th>MAX</th>
				</tr>
			</thead>

			<tbody>
				<tr>
					<td>EASY</td>
					<td><input type="text" id="easyMin" placeholder="mm:ss" /></td>
					<td><input type="text" id="easyMax" placeholder="mm:ss" /></td>
				</tr>

				<tr>
					<td>MARATHON</td>
					<td><input type="text" id="marathon" placeholder="mm:ss" /></td>
					<td>-</td>
				</tr>

				<tr>
					<td>THRESHOLD</td>
					<td><input type="text" id="threshold" placeholder="mm:ss" /></td>
					<td>-</td>
				</tr>

				<tr>
					<td>INTERVAL</td>
					<td><input type="text" id="interval" placeholder="mm:ss" /></td>
					<td>-</td>
				</tr>

				<tr>
					<td>REPETITION</td>
					<td><input type="text" id="repetition" placeholder="mm:ss" /></td>
					<td>-</td>
				</tr>

				<tr>
					<td>PROVA 5KM</td>
					<td><input type="text" id="prova5k" placeholder="mm:ss" /></td>
					<td>-</td>
				</tr>
			</tbody>
		</table>

		<button id="btnCalcular">Calcular</button>

		<div class="resultado" id="resultado"></div>
		<div style="margin-top: 30px">
			<h2>Plano Gerado</h2>

			<textarea id="textoTreino"></textarea>

			<br /><br />

			<button onclick="copiarTexto()">Copiar Texto</button>

			<button onclick="baixarTxt()">Baixar .txt</button>
		</div>
		<script src="script.js" type="module"></script>
	</body>
</html>
